<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>今日進歩 - PERSONA STYLE</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
/* ===== P5 Persona 5 Style ===== */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #1a0a0a;
  color: #ffe0e0;
  font-family: 'Noto Sans JP','Segoe UI',sans-serif;
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  padding:20px 10px 40px;
  background-image: linear-gradient(135deg,rgba(180,0,30,.15) 25%,transparent 25%,transparent 50%,rgba(180,0,30,.15) 50%,rgba(180,0,30,.15) 75%,transparent 75%);
  background-size:40px 40px;
}

h1 {
  font-size:28px; letter-spacing:6px;
  color:#e60026; text-shadow:0 0 20px #ff204060,2px 2px 0 #000;
  margin-bottom:4px;
}
.sub { font-size:12px; color:#aa6677; margin-bottom:18px; letter-spacing:2px; }

/* 输入区 */
.log-area {
  width:100%; max-width:520px;
  background: linear-gradient(160deg,#2a0a0f,#1a0608);
  border:2px solid #c4001a; border-radius:6px;
  padding:14px; margin-bottom:18px;
  box-shadow:0 0 18px #c4001a44;
}
.log-area textarea {
  width:100%; height:60px; resize:none;
  background:transparent; border:none; outline:none;
  color:#ffe0e0; font-size:15px; font-family:inherit;
}
.log-area textarea::placeholder { color:#884455; }
.log-area button {
  margin-top:8px; width:100%; padding:8px;
  background:#c4001a; color:#fff; border:none; border-radius:4px;
  font-size:15px; font-weight:700; cursor:pointer;
  letter-spacing:3px;
  transition: background .2s;
}
.log-area button:hover { background:#ff2244; }

/* 主布局 */
.main { display:flex; flex-wrap:wrap; gap:24px; justify-content:center; align-items:flex-start; width:100%; max-width:860px; }

/* 雷达图 */
.chart-box {
  background:#140508; border:2px solid #c4001a88; border-radius:8px;
  padding:16px; box-shadow:0 0 30px #c4001a33;
}
.chart-box canvas { max-width:320px; max-height:320px; }

/* 日历 */
.calendar {
  background:#1e080c; border:2px solid #c4001a66; border-radius:8px;
  padding:12px 14px; width:300px;
  box-shadow:0 0 20px #c4001a22;
}
.cal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.cal-head button { background:none; border:none; color:#e60026; font-size:20px; cursor:pointer; }
.cal-head span  { font-size:15px; letter-spacing:2px; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; text-align:center; }
.cal-grid .dow { font-size:11px; color:#995566; padding:4px 0; }
.cal-grid .day {
  padding:6px 0; border-radius:4px; cursor:pointer; font-size:13px;
  transition: background .15s;
}
.cal-grid .day:hover { background:#c4001a44; }
.cal-grid .day.today { outline:1px solid #e60026; }
.cal-grid .day.has-log { background:#c4001a33; color:#ff8899; font-weight:700; }
.cal-grid .day.empty { pointer-events:none; }

/* 弹窗 */
.modal {
  position:fixed; inset:0; background:#000b; display:none;
  justify-content:center; align-items:center; z-index:99;
}
.modal.show { display:flex; }
.modal-inner {
  background:#1e080c; border:2px solid #c4001a; border-radius:8px;
  padding:20px 24px; max-width:400px; width:90%;
  max-height:70vh; overflow:auto;
}
.modal-inner h3 { color:#e60026; margin-bottom:10px; font-size:16px; }
.modal-inner pre { white-space:pre-wrap; font-size:14px; color:#ffccdd; line-height:1.6;}
.modal-inner button {
  margin-top:12px; background:none; border:1px solid #c4001a;
  color:#e60026; padding:4px 16px; border-radius:4px; cursor:pointer; float:right;
}
</style>
</head>
<body>

<h1>進歩レーダー</h1>
<p class="sub">DAILY PROGRESS — PERSONA SYSTEM</p>

<!-- 输入区 -->
<div class="log-area">
  <textarea id="logInput" placeholder="今日何をしたか入力…（例：コード学習・ジョギング・読書）"></textarea>
  <button onclick="saveLog()">記録する / SAVE</button>
</div>

<!-- 主体 -->
<div class="main">
  <!-- 雷达图 -->
  <div class="chart-box"><canvas id="radar"></canvas></div>

  <!-- 日历 -->
  <div class="calendar">
    <div class="cal-head">
      <button onclick="changeMonth(-1)">◀</button>
      <span id="calTitle"></span>
      <button onclick="changeMonth(1)">▶</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<!-- 弹窗 -->
<div class="modal" id="modal" onclick="this.classList.remove('show')">
  <div class="modal-inner" onclick="event.stopPropagation()">
    <h3 id="modalDate"></h3>
    <pre id="modalBody"></pre>
    <button onclick="document.getElementById('modal').classList.remove('show')">閉じる</button>
    <div style="clear:both"></div>
  </div>
</div>

<script>
/* ===== 数据 key ===== */
const DIMENSIONS = ['勇气','魅力','知识','灵巧','体贴'];
const RADAR_KEY  = 'p5_radar';   // [3,2,3,2,1]
const LOG_KEY    = 'p5_logs';     // {"2026-06-05":"xxx"...}

let curYear, curMonth;

/* ===== 保存日志 + 模拟AI打分 ===== */
function saveLog(){
  const txt = document.getElementById('logInput').value.trim();
  if(!txt) return;
  const today = new Date();
  const dk = fmt(today);

  // 存日志
  const logs = JSON.parse(localStorage.getItem(LOG_KEY)||'{}');
  logs[dk] = (logs[dk]?logs[dk]+'\n---\n':'') + txt;
  localStorage.setItem(LOG_KEY, JSON.stringify(logs));

  // 模拟AI打分（你后期替换成真实GPT返回）
  const score = [
    Math.ceil(Math.random()*3),
    Math.ceil(Math.random()*3),
    Math.ceil(Math.random()*3),
    Math.ceil(Math.random()*3),
    Math.ceil(Math.random()*3)
  ];
  localStorage.setItem(RADAR_KEY, JSON.stringify(score));

  document.getElementById('logInput').value = '';
  renderCalendar();
}

/* ===== 日历工具 ===== */
function fmt(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

function changeMonth(d){
  curMonth+=d;
  if(curMonth>11){curMonth=0;curYear++}
  if(curMonth<0){curMonth=11;curYear--}
  renderCalendar();
}

function renderCalendar(){
  const now=new Date(), logs=JSON.parse(localStorage.getItem(LOG_KEY)||'{}');
  curYear  = curYear  ?? now.getFullYear();
  curMonth = curMonth ?? now.getMonth();
  const firstDay=new Date(curYear,curMonth,1).getDay();
  const daysInMonth=new Date(curYear,curMonth+1,0).getDate();
  const todayStr=fmt(now);

  document.getElementById('calTitle').textContent=curYear+' / '+String(curMonth+1).padStart(2,'0');

  let html=['日','月','火','水','木','金','土'].map(d=>`<div class="dow">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++) html+=`<div class="day empty"></div>`;

  for(let d=1;d<=daysInMonth;d++){
    const dk=`${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls=['day'];
    if(dk===todayStr) cls.push('today');
    if(logs[dk])      cls.push('has-log');
    html+=`<div class="${cls.join(' ')}" onclick="showLog('${dk}')">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}

function showLog(dk){
  const logs=JSON.parse(localStorage.getItem(LOG_KEY)||'{}');
  document.getElementById('modalDate').textContent='📅 '+dk;
  document.getElementById('modalBody').textContent=logs[dk]||'（この日の記録はありません）';
  document.getElementById('modal').classList.add('show');
}

/* ===== Chart.js 雷达图 — P5红 ===== */
const ctx=document.getElementById('radar').getContext('2d');
let radarChart=new Chart(ctx,{
  type:'radar',
  data:{
    labels:DIMENSIONS,
    datasets:[{
      label:'今日進歩',
      data:JSON.parse(localStorage.getItem(RADAR_KEY)||'[1,1,1,1,1]'),
      backgroundColor:'rgba(230,0,38,.25)',
      borderColor:'#e60026',
      borderWidth:2.5,
      pointBackgroundColor:'#ff4466',
      pointBorderColor:'#fff',
      pointRadius:5
    }]
  },
  options:{
    responsive:true,
    scales:{
      r:{
        min:0,max:3,ticks:{display:false,stepSize:1},
        grid:{color:'rgba(230,0,38,.3)'},
        angleLines:{color:'rgba(230,0,38,.45)'},
        pointLabels:{color:'#ffaabb',font:{size:13,weight:'bold'}}
      }
    },
    plugins:{legend:{display:false}}
  }
});

/* 自动刷新：每2秒读localStorage -> 无整页刷新 */
setInterval(()=>{
  try{
    const d=JSON.parse(localStorage.getItem(RADAR_KEY));
    if(Array.isArray(d)&&d.length===5){
      radarChart.data.datasets[0].data=d;
      radarChart.update('none');
    }
  }catch(e){}
},2000);

/* 启动 */
renderCalendar();
</script>
</body>
</html>
